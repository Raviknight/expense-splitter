<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Splitab</title>
    <meta name="theme-color" content="#FAFAF7" />

    <!-- PWA manifest (relative path works under any GitHub Pages subpath) -->
    <link rel="manifest" href="manifest.json" />

    <!-- Apple / iOS home screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Splitab" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />

    <!-- Tailwind via official Play CDN so the existing utility classes render. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { background-color: #FAFAF7; }
      /* iOS Safari auto-zooms when you focus a text field smaller than 16px,
         and that zoom sticks in home-screen (standalone) mode — making the app
         look slightly enlarged. Forcing 16px form text on small screens stops
         the zoom without disabling pinch-to-zoom elsewhere. */
      @media (max-width: 640px) {
        input, select, textarea { font-size: 16px !important; }
      }
    </style>

    <!-- Service worker registration.
         'sw.js' is a relative path so the SW scope matches the GitHub Pages
         subpath (/expense-splitter/) rather than locking to the root (/). -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').then(function (reg) {
            console.log('[SW] Registered, scope:', reg.scope);
          }).catch(function (err) {
            console.error('[SW] Registration failed:', err);
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="bundle.js"></script>
  </body>
</html>
